version: "2"
id: oss_repo_agent_issue_intake
title: OSS repo-agent issue intake
description: >
  Atomic intake correlation path on Fala 0.2.x: poll GitHub issues, claim one,
  ensure Hermes Kanban [issue] task. Python effectors in repo_agent.steps.*.
tags: ["repo-agent", "intake", "github", "hermes"]

impulse_types: []
reaction_kinds: []

capabilities:
  - id: poll
    title: Poll eligible GitHub issues
  - id: claim
    title: Claim selected GitHub issue
  - id: kanban
    title: Ensure Kanban intake task

correlation_paths:
  - id: issue_intake
    title: GitHub issue intake
    effectors:
      - id: poll
        capability: poll
        adapter:
          kind: python_function
          ref: repo_agent.steps.poll.poll_eligible_issues
      - id: claim
        capability: claim
        conduction: [poll]
        adapter:
          kind: python_function
          ref: repo_agent.steps.claim.claim_github_issue
      - id: kanban
        capability: kanban
        conduction: [claim]
        adapter:
          kind: python_function
          ref: repo_agent.steps.kanban_intake.ensure_kanban_intake

runtime:
  backend:
    kind: sqlite
    path: .fala/state.sqlite
  reaction_store:
    kind: filesystem
    root: .fala/reactions
