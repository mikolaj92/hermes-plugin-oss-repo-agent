version: 1
mode: live
clone_root: /absolute/path/to/repos
worktree_root: /absolute/path/to/worktrees
branch_prefix: ai/fix
# Safe defaults: automerge is disabled until human approval, passing checks,
# and test evidence are all present.
automerge: false
require_human_approval: true
require_checks: true
require_test_evidence: true
github:
  cli: gh
  default_limit: 10
  assignee: owner
labels:
  ready: ai:ready
  in_progress: ai:in-progress
  blocked: ai:blocked
  pr_opened: ai:pr-opened
  generated: ai:generated
executor:
  enabled: true
  command: omp
  model: omniroute/omp/default
  thinking: medium
  timeout_seconds: 7200
  max_attempts: 3
  retry_backoff_seconds: 60
repos:
  - repo: owner/example-repo
    board: owner-example-repo
    clone_path: /absolute/path/to/repos/example-repo
    trusted_authors: []
    trusted_branch_prefixes: [ai/fix]
    allowed_base_branches: [main]
    external_pr_policy: block
