name: checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: hermes-plugin-oss-repo-agent
      - uses: actions/checkout@v4
        with:
          repository: mikolaj92/Fala
          path: Fala
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and Fala
        working-directory: hermes-plugin-oss-repo-agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ../Fala
          python -m pip install -e .
          python -m pip install PyYAML
      - name: Run unit suite
        working-directory: hermes-plugin-oss-repo-agent
        env:
          FALA_HOME: ${{ github.workspace }}/Fala
          PYTHONPATH: src:.
        run: python -m unittest discover -s tests -v
      - name: Hygiene
        working-directory: hermes-plugin-oss-repo-agent
        run: python tools/hygiene_check.py .
