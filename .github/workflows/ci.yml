name: checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install YAML support
        run: python -m pip install --upgrade pip PyYAML
      - name: Install project and Fala runtime dependencies
        run: python -m pip install -e . jsonschema pydantic PyYAML
      - name: Add source paths
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$GITHUB_WORKSPACE/../Fala/src" >> "$GITHUB_ENV"
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Run hygiene checks
        run: python tools/hygiene_check.py .
