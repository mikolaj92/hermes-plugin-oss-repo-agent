name: checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: hermes-plugin-oss-repo-agent
      - uses: actions/checkout@v4
        with:
          repository: mikolaj92/Fala
          path: Fala
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and Fala
        working-directory: hermes-plugin-oss-repo-agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ../Fala
          python -m pip install -e .
          python -m pip install PyYAML
      - name: Run hermetic issue→PR→merge contract suite
        working-directory: hermes-plugin-oss-repo-agent
        env:
          PYTHONPATH: src
        run: |
          python -m unittest \
            tests.test_issue_to_pr_to_merge_contract \
            tests.test_decide_matrix \
            tests.test_issue_direction_intake \
            tests.test_path_composition \
            tests.test_fala_triage_router \
            tests.test_atomic_effectors.TriageTests \
            tests.test_atomic_effectors.CatalogTests \
            tests.test_atomic_effectors.IssueToPrTests \
            tests.test_atomic_effectors.RepairTests \
            -v
      - name: Hygiene
        working-directory: hermes-plugin-oss-repo-agent
        run: python tools/hygiene_check.py .
