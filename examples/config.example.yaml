version: 1
mode: dry-run
clone_root: <clone-root>
worktree_root: <worktree-root>
branch_prefix: ai/fix
# Set to true to auto-merge own PRs (author == repo owner) when mergeStateStatus == CLEAN.
# External PRs are never auto-merged.
automerge: true
github:
  cli: gh
  default_limit: 10
labels:
  ready: ai:ready
  in_progress: ai:in-progress
  blocked: ai:blocked
  pr_opened: ai:pr-opened
  generated: ai:generated
executor:
  enabled: false
  # Uses claude --dangerously-skip-permissions in background (nohup ... &).
  # Max concurrent agents is controlled by HERMES_ISSUE_TO_PR_MAX_CLAUDE_AGENTS (default 3).
  command: claude
repos:
  - repo: owner/example-repo
    board: owner-example-repo
    clone_path: <clone-root>/example-repo
    trusted_authors: [owner]
    trusted_branch_prefixes: [ai/fix]
    allowed_base_branches: [main]
    external_pr_policy: block
