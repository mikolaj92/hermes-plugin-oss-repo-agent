version = 1
mode = "live"
branch_prefix = "ai/fix"
base_branch = "main"

[github]
cli = "gh"
assignee = "owner"

[labels]
ready = "ai:ready"
in_progress = "ai:in-progress"
blocked = "ai:blocked"
pr_opened = "ai:pr-opened"
generated = "ai:generated"

[automation]
max_active_issues = 1
automerge = false
require_human_approval = true
require_checks = true
require_test_evidence = true
fixer_assignee = "repo-agent-fixer"
merge_method = "merge"

[direction]
# Free-text goal; issues must share tokens with this text when set.
repo_goal = ""
require_keywords = []
deny_keywords = []
reject_labels = ["ai:out-of-scope", "wontfix", "invalid"]
min_goal_overlap = 1

[executor]
enabled = true
command = "omp"
model = "omniroute/omp/default"
thinking = "medium"
timeout_seconds = 7200
max_attempts = 3
retry_backoff_seconds = 60

[paths]
worktree_root = "~/.hermes/worktrees/repo-agent"
dispatch_receipts = "~/.hermes/state/repo-agent-dispatch"
task_receipts = "~/.hermes/state/repo-agent-receipts"
merge_receipts = "~/.hermes/state/repo-agent-merge"
active_issue = "~/.hermes/state/repo-agent-active"

[[repos]]
repo = "owner/example-repo"
board = "owner-example-repo"
clone_path = "~/.hermes/repos/example-repo"
priority = 100
